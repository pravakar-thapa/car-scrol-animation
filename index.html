<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Car Scroll Hero</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<section class="hero">

  <!-- 🛣️ ROAD -->
  <div class="road-wrapper">
    <div class="road-line">
      <div class="road-progress">
        <span class="progress-text">W E L C O M E &nbsp; I T Z F I Z Z</span>
      </div>
    </div>

    <!-- 🚗 CAR -->
    <img src="car.png" class="car" />
  </div>

  <!-- 🪧 MILESTONES (outside road-wrapper) -->
  <div class="milestone top m1">
    <div class="connector"></div>
    <div class="card green">
      <h2>58%</h2>
      <p>Increase in pick up point use</p>
    </div>
  </div>

  <div class="milestone top m2">
    <div class="connector"></div>
    <div class="card dark">
      <h2>27%</h2>
      <p>Increase in pick up point use</p>
    </div>
  </div>

  <div class="milestone bottom m3">
    <div class="connector"></div>
    <div class="card blue">
      <h2>23%</h2>
      <p>Decreased customer phone calls</p>
    </div>
  </div>

  <div class="milestone bottom m4">
    <div class="connector"></div>
    <div class="card orange">
      <h2>40%</h2>
      <p>Decreased customer phone calls</p>
    </div>
  </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
<script src="script.js"></script>

</body>
</html>
